[skill]
name        = "skill-mcp-protocol"
version     = "0.2.0"
description = """
Unified manager for AI skills and MCP servers across Claude Code and Codex.
Install, update, remove, export, and import skills with automatic host registration
and per-skill runtime management. AI agents discover this tool via SKILL.md
and use the smcp CLI for all operations.
"""
author  = "newbiee2018"
license = "MIT"
tags    = ["meta", "management", "protocol", "bootstrap"]

[runtime]
type           = "python"
python_version = "3.8"
install_cmd    = "pip install -r requirements.txt"

[mcp]
entrypoint = "src/main.py"
transport  = "stdio"

# smcp itself is NOT an MCP server — it's a CLI tool.
# AI agents use `smcp` commands. Other skills it installs CAN be MCP servers.
# To opt-in to MCP mode: smcp register skill-mcp-protocol --hosts claude_code codex
[hosts]
claude_code = false
codex       = false
